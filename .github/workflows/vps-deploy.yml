name: VPS Deployment

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH || '~/Maria-Dubson' }}
            
            # Pull latest changes
            git pull origin main
            
            # Install dependencies
            npm install
            
            # Build Prisma client
            npx prisma generate
            
            # Run database migrations
            npx prisma migrate deploy
            
            # Build the application
            npm run build
            
            # Restart the process (assuming PM2 or similar)
            if command -v pm2 &> /dev/null
            then
                pm2 restart all || pm2 start npm --name "maria-dubson" -- start
            else
                echo "PM2 not found. Restarting with standard npm start in background."
                pkill -f "next-server" || true
                nohup npm start > app.log 2>&1 &
            fi
            
            echo "Deployment successful!"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-marina_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marina} -d ${POSTGRES_DB:-marina_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=postgresql://${POSTGRES_USER:-marina}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-marina_crm}
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-marina}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-marina_crm}
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://md.aitaah.com}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://md.aitaah.com}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Marina Dubson Stenographic Services}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - "traefik.http.routers.marina-http.rule=Host(`${DOMAIN:-md.aitaah.com}`)"
      - traefik.http.routers.marina-http.entrypoints=http
      - traefik.http.routers.marina-http.middlewares=marina-https-redirect
      - traefik.http.middlewares.marina-https-redirect.redirectscheme.scheme=https
      - "traefik.http.routers.marina-https.rule=Host(`${DOMAIN:-md.aitaah.com}`)"
      - traefik.http.routers.marina-https.entrypoints=https
      - traefik.http.routers.marina-https.tls=true
      - traefik.http.routers.marina-https.tls.certresolver=letsencrypt
      - traefik.http.services.marina-https.loadbalancer.server.port=3000
    networks:
      - internal
      - coolify

volumes:
  postgres_data:
  uploads_data:

networks:
  internal:
    driver: bridge
  coolify:
    external: true
